<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Фильтр для свечения -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Прозрачный фон - не нужен фон -->
  
  <!-- Оранжевая звезда ✨ в центре -->
  <g transform="translate(16,16)" filter="url(#glow)">
    <!-- Основная звезда оранжевая -->
    <path d="M0,-8 L2,-2 L8,-1 L3,2 L2,8 L0,3 L-2,8 L-3,2 L-8,-1 L-2,-2 Z" 
          fill="#fb923c" 
          stroke="#f59e0b" 
          stroke-width="0.5"/>
    
    <!-- Две жёлтые искры вокруг -->
    <circle cx="-6" cy="-6" r="1" fill="#fbbf24" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="-6" r="0.8" fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
